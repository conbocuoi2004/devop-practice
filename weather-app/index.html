<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      width: 400px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.2);
    }
    h1 { font-size: 24px; margin-bottom: 24px; opacity: 0.9; }
    .search { display: flex; gap: 10px; margin-bottom: 30px; }
    .search input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 15px;
      outline: none;
    }
    .search input::placeholder { color: rgba(255,255,255,0.6); }
    .search button {
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      background: #e94560;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }
    .search button:hover { background: #c73652; }
    .weather { display: none; }
    .city { font-size: 28px; font-weight: 600; margin-bottom: 4px; }
    .country { font-size: 14px; opacity: 0.7; margin-bottom: 20px; }
    .temp { font-size: 72px; font-weight: 700; margin-bottom: 8px; }
    .desc { font-size: 18px; opacity: 0.8; margin-bottom: 24px; text-transform: capitalize; }
    .icon { font-size: 64px; margin-bottom: 16px; }
    .details { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
    .detail {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px;
    }
    .detail-label { font-size: 12px; opacity: 0.6; margin-bottom: 4px; }
    .detail-value { font-size: 20px; font-weight: 600; }
    .error { color: #e94560; margin-top: 10px; display: none; font-size: 14px; }
    .loading { opacity: 0.6; margin-top: 10px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🌤 Weather Dashboard</h1>
    <div class="search">
      <input type="text" id="city" placeholder="Nhập tên thành phố..." onkeydown="if(event.key==='Enter')getWeather()">
      <button onclick="getWeather()">Tìm</button>
    </div>
    <div class="loading" id="loading">Đang tải...</div>
    <div class="error" id="error">Không tìm thấy thành phố!</div>
    <div class="weather" id="weather">
      <div class="icon" id="icon"></div>
      <div class="city" id="city-name"></div>
      <div class="country" id="country"></div>
      <div class="temp" id="temp"></div>
      <div class="desc" id="desc"></div>
      <div class="details">
        <div class="detail">
          <div class="detail-label">Độ ẩm</div>
          <div class="detail-value" id="humidity"></div>
        </div>
        <div class="detail">
          <div class="detail-label">Gió</div>
          <div class="detail-value" id="wind"></div>
        </div>
        <div class="detail">
          <div class="detail-label">Cảm giác như</div>
          <div class="detail-value" id="feels"></div>
        </div>
        <div class="detail">
          <div class="detail-label">Tầm nhìn</div>
          <div class="detail-value" id="visibility"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_KEY = 'YOUR_API_KEY';
    const icons = {
      'Clear': '☀️', 'Clouds': '☁️', 'Rain': '🌧️',
      'Drizzle': '🌦️', 'Thunderstorm': '⛈️', 'Snow': '❄️',
      'Mist': '🌫️', 'Fog': '🌫️', 'Haze': '🌫️'
    };

    async function getWeather() {
      const city = document.getElementById('city').value.trim();
      if (!city) return;
      document.getElementById('loading').style.display = 'block';
      document.getElementById('error').style.display = 'none';
      document.getElementById('weather').style.display = 'none';

      try {
        const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric&lang=vi`);
        const data = await res.json();
        if (data.cod !== 200) throw new Error();

        document.getElementById('icon').textContent = icons[data.weather[0].main] || '🌡️';
        document.getElementById('city-name').textContent = data.name;
        document.getElementById('country').textContent = data.sys.country;
        document.getElementById('temp').textContent = Math.round(data.main.temp) + '°C';
        document.getElementById('desc').textContent = data.weather[0].description;
        document.getElementById('humidity').textContent = data.main.humidity + '%';
        document.getElementById('wind').textContent = Math.round(data.wind.speed * 3.6) + ' km/h';
        document.getElementById('feels').textContent = Math.round(data.main.feels_like) + '°C';
        document.getElementById('visibility').textContent = (data.visibility / 1000).toFixed(1) + ' km';

        document.getElementById('weather').style.display = 'block';
      } catch {
        document.getElementById('error').style.display = 'block';
      }
      document.getElementById('loading').style.display = 'none';
    }
  </script>
</body>
</html>
